<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Applications</title>
</head>
<body>
    
    <button class="pending-applications">Pending</button>
    <div id="applications"></div>
    <form id="createTeamLeadForm">

        <input
            type="email"
            id="email"
            placeholder="Team Lead Email"
            required
        >
    
        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >
    
        <button type="submit">
            Create Team Lead
        </button>
    
    </form>
    <script src="./script.js"></script>
</body>
</html>
