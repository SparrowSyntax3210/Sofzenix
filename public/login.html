<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <!-- Admin Login -->
    <div class="card">
        <h2>Admin Login</h2>

        <form id="adminLoginForm">

            <input
                type="email"
                id="adminEmail"
                placeholder="Admin Email"
                required
            >

            <input
                type="password"
                id="adminPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login as Admin
            </button>

        </form>
    </div>

    <!-- HR Login -->
    <div class="card">
        <h2>HR / Team Lead / Intern Login</h2>

        <form id="hrLoginForm">

            <input
                type="email"
                id="hrEmail"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="hrPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>
    </div>

</div>

<script>
    // ---------------- Admin Login ----------------

document
.getElementById("adminLoginForm")
.addEventListener("submit", adminLogin);

async function adminLogin(e){

    e.preventDefault();

    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPassword").value;

    try{

        const response = await fetch("/login/admin",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email,
                password
            })

        });

        const data = await response.json();

        if(!response.ok){
            alert(data.message);
            return;
        }

        localStorage.setItem("token",data.token);

        if (data.role === "hr") {
            window.location.href = "/opportunities.html";
        } else if (data.role === "teamlead") {
            window.location.href = "/pending-applications.html";
        } else if (data.role === "intern") {
            window.location.href = "/applications.html";
        } else {
            window.location.href = "/hr-creation.html";
        }

    }

    catch(err){
        console.log(err);
        alert("Server Error");
    }

}

// ---------------- HR Login ----------------

document
.getElementById("hrLoginForm")
.addEventListener("submit", hrLogin);

async function hrLogin(e){

    e.preventDefault();

    const email = document.getElementById("hrEmail").value;
    const password = document.getElementById("hrPassword").value;

    try{

        const response = await fetch("/login/hr",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email,
                password
            })

        });

        const data = await response.json();

        if(!response.ok){
            alert(data.message);
            return;
        }

        localStorage.setItem("token",data.token);

        if (data.role === "hr") {
            window.location.href = "/opportunities.html";
        } else if (data.role === "teamlead") {
            window.location.href = "/pending-applications.html";
        } else if (data.role === "intern") {
            window.location.href = "/applications.html";
        } else {
            window.location.href = "/hr-creation.html";
        }

    }

    catch(err){
        console.log(err);
        alert("Server Error");
    }

}
</script>

</body>
</html>
